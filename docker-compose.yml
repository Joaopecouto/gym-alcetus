services:
  app:
    build:
      context: .
      args:
        # Lê do server/.env (que docker-compose injeta) — o Client ID é embutido
        # no bundle do frontend em build time pelo vite-plugin-pwa.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    image: gym-alcetus:latest
    container_name: gym-alcetus
    restart: unless-stopped
    env_file:
      - server/.env
    ports:
      # Host:Container — bind no localhost da VPS, container escuta 3000 internamente
      - "127.0.0.1:3010:3000"
    volumes:
      - gym-alcetus-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gym-alcetus-data:
