services:
  app:
    build:
      context: .
      args:
        # ATENÇÃO ao deploy: ${GOOGLE_CLIENT_ID:-} é interpolado pelo compose a
        # partir de UM .env na raiz do projeto (NÃO do server/.env do env_file).
        # Em produção, o jeito mais simples é fazer um symlink:
        #   ln -sf server/.env .env
        # Sem isso, o Client ID vira string vazia, o build do frontend roda mas
        # o GoogleSignInButton mostra 'VITE_GOOGLE_CLIENT_ID não configurado'.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    image: gym-alcetus:latest
    container_name: gym-alcetus
    restart: unless-stopped
    env_file:
      - server/.env
    ports:
      # Host:Container — bind no localhost da VPS, container escuta 3000 internamente
      - "127.0.0.1:3010:3000"
    volumes:
      - gym-alcetus-data:/data
    networks:
      # default: rede do compose (gym-alcetus_default), criada automaticamente.
      # easypanel: rede external do Traefik do EasyPanel — sem isso, o nome
      # `gym-alcetus` não resolve dentro do Traefik e dá 502 Bad Gateway.
      - default
      - easypanel
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gym-alcetus-data:

networks:
  easypanel:
    external: true
