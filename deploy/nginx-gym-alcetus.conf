# =============================================================================
#  Gym Alcetus — config nginx pra reverse proxy + HTTPS
# =============================================================================
#  Local: /etc/nginx/sites-available/gym-alcetus
#  Ativar: ln -sf /etc/nginx/sites-available/gym-alcetus \
#                /etc/nginx/sites-enabled/gym-alcetus && nginx -t && systemctl reload nginx
#
#  Substitua SEU_DOMINIO pelo domínio real (ex: iron.alcetus.com).
#  TLS é provisionado pelo certbot (ver deploy/hostinger-tls.sh).
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO;

    # ACME challenge pro Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect tudo o resto pra HTTPS (depois do certbot rodar)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SEU_DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Hardening básico
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse proxy pro container Docker (porta 3000 só no localhost da VPS)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Service Worker e PWA gostam de buffers maiores
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Cache agressivo nos assets do build (eles têm hash no nome)
    location /assets/ {
        proxy_pass http://127.0.0.1:3010;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
